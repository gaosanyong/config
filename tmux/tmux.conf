### Essential
# Reload config file
unbind r
bind r source-file ~/.tmux.conf

# Remap prefix to 'C-a'
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Set tmux global options
set -g allow-passthrough on             # allow program to bypass tmux using terminal escape
set -g default-command "${SHELL}"       # run ${SHELL} command for new window
set -g history-limit 500000             # hold 500,000 lines in window history
set -g mouse on                         # enable mouse support
set -g set-clipboard on
set -ga update-environment "COLORTERM TERM_PROGRAM"

# Set tmux session options
set -s default-terminal "tmux-256color" # set default value of $TERM
set -s escape-time 0                    # wait 0 milliseconds after escape for key-sequence
set -sa terminal-features ",alacritty:RGB:usstyle"
set -sa terminal-features ",wezterm:RGB:usstyle"
set -sa terminal-features ",xterm-ghostty:RGB:usstyle"
set -sa terminal-features ",xterm-kitty:RGB:usstyle"
set -sa terminal-overrides ",alacritty:Tc"
set -sa terminal-overrides ",wezterm:Tc:E3=\\E[3J"
set -sa terminal-overrides ",xterm-ghostty:Tc"
set -sa terminal-overrides ",xterm-kitty:Tc"
set-environment -g COLORTERM truecolor

# Enable vim-style pane navigation
bind h select-pane -L
bind j select-pane -U
bind k select-pane -D
bind l select-pane -R

# Close without confirm
bind & kill-window
bind x kill-pane

# Split window intuitively
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"

# Cmd+K: clear scrollback (terminals send \ek for super+k)
bind-key -n M-k send-keys -R \; clear-history \; send-keys C-l \; refresh-client

