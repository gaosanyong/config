# Everforest Light for eza
# Place at ~/.config/eza/theme.yml

filekinds:
  normal:
    foreground: "#5c6a72"
  directory:
    foreground: "#3a94c5"
    bold: true
  symlink:
    foreground: "#35a77c"
  pipe:
    foreground: "#dfa000"
  block_device:
    foreground: "#f57d26"
  char_device:
    foreground: "#f57d26"
  socket:
    foreground: "#df69ba"
  special:
    foreground: "#dfa000"
  executable:
    foreground: "#8da101"
    bold: true
  mount_point:
    foreground: "#3a94c5"
    bold: true

perms:
  user_read:
    foreground: "#8da101"
  user_write:
    foreground: "#dfa000"
  user_execute_file:
    foreground: "#f85552"
  user_execute_other:
    foreground: "#f85552"
  group_read:
    foreground: "#8da101"
  group_write:
    foreground: "#dfa000"
  group_execute:
    foreground: "#f85552"
  other_read:
    foreground: "#8da101"
  other_write:
    foreground: "#dfa000"
  other_execute:
    foreground: "#f85552"
  special_user_file:
    foreground: "#df69ba"
  special_other:
    foreground: "#df69ba"
  attribute:
    foreground: "#939b87"

size:
  number_byte:
    foreground: "#8da101"
  number_kilo:
    foreground: "#8da101"
  number_mega:
    foreground: "#dfa000"
  number_giga:
    foreground: "#f57d26"
  number_huge:
    foreground: "#f85552"
  unit_byte:
    foreground: "#8da101"
  unit_kilo:
    foreground: "#8da101"
  unit_mega:
    foreground: "#dfa000"
  unit_giga:
    foreground: "#f57d26"
  unit_huge:
    foreground: "#f85552"

users:
  user_you:
    foreground: "#3a94c5"
  user_other:
    foreground: "#939b87"
  group_yours:
    foreground: "#3a94c5"
  group_other:
    foreground: "#939b87"

git:
  new:
    foreground: "#8da101"
  modified:
    foreground: "#dfa000"
  deleted:
    foreground: "#f85552"
  renamed:
    foreground: "#35a77c"
  ignored:
    foreground: "#a6b0a0"
  conflicted:
    foreground: "#f85552"
    bold: true

symlink_path:
  foreground: "#35a77c"

punctuation:
  foreground: "#a6b0a0"

date:
  foreground: "#df69ba"

inode:
  foreground: "#939b87"

blocks:
  foreground: "#939b87"

header:
  foreground: "#5c6a72"
  bold: true

filetype:
  image:
    foreground: "#df69ba"
  video:
    foreground: "#df69ba"
  music:
    foreground: "#35a77c"
  lossless:
    foreground: "#35a77c"
  crypto:
    foreground: "#f57d26"
  document:
    foreground: "#3a94c5"
  compressed:
    foreground: "#f85552"
  temp:
    foreground: "#a6b0a0"
  compiled:
    foreground: "#dfa000"

